<!doctype html>
<div class="auth-card fade-up">
	<div class="brand-row">
		<span class="brand-mark">F</span>
		<span class="brand-text">Fuck eAsistent</span>
	</div>
	<h1>Prijava</h1>
	<p class="muted">Vpiši se v svoj račun.</p>
	<form (submit)="onSubmit($event)" class="form">
		<label>
			<span class="label">Uporabniško ime</span>
			<input id="username" type="text" [formField]="loginForm.username" autocomplete="username" />
			@if (loginForm.username().invalid() && loginForm.username().touched()) {
				<div class="field-error">
					@for (error of loginForm.username().errors(); track error.kind) {
						<span>{{ error.message }}</span>
					}
				</div>
			}
		</label>
		<label>
			<span class="label">Geslo</span>
			<div class="password-wrap">
				<input
					id="password"
					[type]="show ? 'text' : 'password'"
					[formField]="loginForm.password"
					autocomplete="current-password"
				/>
				<button
					type="button"
					class="ghost icon-btn"
					(click)="togglePassword()"
					aria-label="Pokaži geslo"
				>
					<img src="eye.svg" alt="" />
				</button>
			</div>
			@if (loginForm.password().invalid() && loginForm.password().touched()) {
				<div class="field-error">
					@for (error of loginForm.password().errors(); track error.kind) {
						<span>{{ error.message }}</span>
					}
				</div>
			}
		</label>
		<button type="submit" [disabled]="loggingIn()">
			@if (loggingIn()) {
				<img class="spin" src="refresh.svg" alt="" />
			} @else {
				Prijava
			}
		</button>
		@if (error().length > 0) {
			<p class="field-error">{{ error() }}</p>
		}
		<p class="muted center">Nimaš računa? <a routerLink="/register">Registriraj se</a></p>
	</form>
</div>
