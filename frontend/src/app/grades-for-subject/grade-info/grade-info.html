<div class="container">
  <div class="value">
    <span class="label">Value:</span>
    <span class="data">{{ grade!.value }}</span>
  </div>
  <div class="value">
    <span class="label">Entered by:</span>
    <span class="data">{{ grade!.entered_by }}</span>
  </div>
  <div class="value">
    <span class="label">Date:</span>
    <span class="data">{{ getDateFormatted() }}</span>
  </div>
  <div class="value">
    <span class="label">Type:</span>
    <span class="data">{{ grade!.type }}</span>
  </div>
  <div class="value">
    <span class="label">Semester:</span>
    <span class="data">{{ grade!.semester }}</span>
  </div>
</div>
